services:
  app:
    build:
      context: ..
      dockerfile: docker_prod/Dockerfile
    container_name: tugas-ppl1-prod-app
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      CI: "true"
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/pokemon_db?schema=public}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "pnpm prisma migrate deploy && pnpm start"
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    container_name: tugas-ppl1-prod-db
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-pokemon_db}
    ports:
      - "5432:5432"
    volumes:
      - prod_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  studio:
    build:
      context: ..
      dockerfile: docker_prod/Dockerfile
    container_name: tugas-ppl1-prod-studio
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/pokemon_db?schema=public}
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "pnpm prisma migrate deploy && pnpm prisma studio --port 51212 --browser none"
    ports:
      - "51212:51212"
    restart: unless-stopped

volumes:
  prod_pgdata:
