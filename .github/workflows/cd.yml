name: CD
run-name: CD for ${{ github.sha }}

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Hub variables
        run: |
          if [ -z "${{ vars.DOCKER_USERNAME }}" ]; then
            echo "DOCKER_USERNAME repo variable is required"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKER_PAC }}" ]; then
            echo "DOCKER_PAC repo secret is required"
            exit 1
          fi

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAC }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract App metadata
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKER_USERNAME }}/tugas-1-ppl-praktikum

      - name: Build and push App image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker_prod/Dockerfile
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          sbom: true

      - name: Extract Studio metadata
        id: meta-studio
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKER_USERNAME }}/tugas-1-ppl-praktikum-studio

      - name: Build and push Studio image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker_prod/Dockerfile
          push: true
          tags: ${{ steps.meta-studio.outputs.tags }}
          labels: ${{ steps.meta-studio.outputs.labels }}
          sbom: true
